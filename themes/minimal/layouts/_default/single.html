{{ define "main" }}
<article>
  <header class="article-header">
    {{ if eq .Section "posts" }}
      <h1 class="article-title">{{ .Title }}</h1>
      <div class="article-meta">{{ .Date.Format "2006年01月02日" }}</div>
    {{ else }}
      <h1 class="page-title">{{ .Title }}</h1>
    {{ end }}
  </header>

  <div class="prose">
    {{ .Content }}
  </div>

  {{ if eq .Section "posts" }}
  <nav class="post-nav">
    <div class="prev">
      {{ with .PrevInSection }}
        <a href="{{ .Permalink }}">← {{ .Title }}</a>
      {{ end }}
    </div>
    <div class="next">
      {{ with .NextInSection }}
        <a href="{{ .Permalink }}">{{ .Title }} →</a>
      {{ end }}
    </div>
  </nav>
  {{ end }}
</article>
{{ end }}
