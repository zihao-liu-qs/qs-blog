<head>
  <meta charset="UTF-8">

<body>
  <div class="site-wrap">
    <header class="site-header">
  <p class="site-name"><a href="../../">liuzihao</a></p>
  <nav class="site-nav">
    <a href="../../blog/">博客</a><a href="../../software/">软件</a><a href="../../about/">关于</a>
  </nav>
</header>

    <main>
      
<article>
  <header class="article-header">
    <div class="product-header-meta">
      
      <span class="product-platforms">macOS</span>
      
      
    </div>
    <h1 class="article-title">Blink</h1>
    <p class="product-hero-tagline">用最少的干扰，完成最深的专注</p>

    
    <div class="buy-box">
      <span class="buy-price">¥68</span>
      
      <button class="buy-btn" id="buy-btn"
        data-product-id="blink"
        data-product-name="Blink"
        data-price="¥68">
        购买
      </button>
      
    </div>
    
  </header>

  <div class="prose">
    <p>Blink 是一款运行在菜单栏的极简番茄钟。没有花哨的统计图表，没有社交功能——只有一个计时器，和你的工作。</p>
<h2 id="功能">功能</h2>
<ul>
<li>菜单栏驻留，随时开始/暂停</li>
<li>自定义工作时长与休息时长</li>
<li>专注结束后系统通知</li>
<li>支持键盘快捷键全程操控</li>
<li>深色 / 浅色模式自动跟随系统</li>
</ul>
<h2 id="系统要求">系统要求</h2>
<p>macOS 13 Ventura 及以上</p>

  </div>
</article>


<script>
document.addEventListener('DOMContentLoaded', function() {
  const buyBtn = document.getElementById('buy-btn');
  if (!buyBtn) {
    console.warn('buy-btn not found');
    return;
  }

  const priceStr = buyBtn.dataset.price || '';
  let priceCents = 0;
  const match = priceStr.match(/[\d.]+/);
  if (match) {
    priceCents = Math.round(parseFloat(match[0]) * 100);
  }
  console.log('Product:', buyBtn.dataset.productId, 'Price:', priceStr, '->', priceCents, 'cents');

  buyBtn.addEventListener('click', async function(e) {
    e.preventDefault();

    const email = prompt('请输入您的邮箱，我们将发送 License Key 到您的邮箱：');
    if (!email) return;

    const originalText = buyBtn.textContent;
    buyBtn.textContent = '正在跳转...';
    buyBtn.disabled = true;

    const payload = {
      product_id: buyBtn.dataset.productId,
      product_name: buyBtn.dataset.productName,
      product_price: priceCents,
      customer_email: email,
      success_url: window.location.origin + '/payment-success',
      cancel_url: window.location.href,
      currency: 'cny'
    };
    console.log('Sending checkout request:', payload);

    try {
      const resp = await fetch('/api/v1/checkout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      console.log('Response status:', resp.status);
      const data = await resp.json();
      console.log('Response data:', data);

      if (!resp.ok) {
        throw new Error(data.error || 'server error');
      }

      if (data.url) {
        window.location.href = data.url;
      } else {
        throw new Error('no checkout url');
      }
    } catch (err) {
      console.error('Checkout error:', err);
      alert('创建支付失败: ' + err.message);
      buyBtn.textContent = originalText;
      buyBtn.disabled = false;
    }
  });
});
</script>


    </main>
