    <p>Logbook 是一个轻量的开发日志工具，帮你在编码间隙记录决策、困惑和灵感。它不是 issue tracker，也不是文档工具——它更像一本工程师的私人日记。</p>

<li>与 Git commit 关联</li>
<li>本地加密存储</li>
<li>导出为 Markdown</li>
</ul>
