<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>激活验证 · </title>
<meta name="description" content="个人主页，博客与软件作品">
<link rel="stylesheet" href="../css/main.css">

</head>
<body>
  <div class="site-wrap">
    <header class="site-header">
  <p class="site-name"><a href="../">liuzihao</a></p>
  <nav class="site-nav">
    <a href="../blog/">博客</a><a href="../software/">软件</a><a href="../about/">关于</a>
  </nav>
</header>

    <main>
      
<div class="activate-page">
  <div class="activate-container">
    <h1 class="activate-title">激活验证</h1>
    <p class="activate-subtitle">请输入您的激活码以完成验证</p>

    <form id="activate-form" class="activate-form">
      <div class="form-group">
        <label for="activation-code" class="form-label">激活码</label>
        <input 
          type="text" 
          id="activation-code" 
          name="activation_code" 
          class="form-input"
          placeholder="请输入激活码"
          required
          autocomplete="off"
        >
      </div>

      <div id="message" class="message" style="display: none;"></div>

      <button type="submit" class="btn-submit" id="submit-btn">
        <span class="btn-text">验证激活</span>
        <span class="btn-loading" style="display: none;">验证中...</span>
      </button>
    </form>
  </div>
</div>

<script>
document.getElementById('activate-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  
  const activationCode = document.getElementById('activation-code').value;
  const submitBtn = document.getElementById('submit-btn');
  const btnText = submitBtn.querySelector('.btn-text');
  const btnLoading = submitBtn.querySelector('.btn-loading');
  const messageDiv = document.getElementById('message');
  
  
  submitBtn.disabled = true;
  btnText.style.display = 'none';
  btnLoading.style.display = 'inline';
  messageDiv.style.display = 'none';
  
  try {
    
    const response = await fetch('/api/v1/activate', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        license: activationCode,
        device_id: 'web-client'
      })
    });
    
    const data = await response.json();
    
    if (data.valid) {
      
      messageDiv.className = 'message message-success';
      messageDiv.textContent = '激活成功!';
      if (data.expire_at) {
        messageDiv.textContent += ' 有效期至: ' + new Date(data.expire_at).toLocaleDateString('zh-CN');
      }
      messageDiv.style.display = 'block';
      
      
      
      
      
    } else {
      
      messageDiv.className = 'message message-error';
      const reasonMap = {
        'invalid_license': '激活码无效',
        'revoked': '激活码已吊销',
        'expired': '激活码已过期',
        'device_limit_reached': '设备数已达上限'
      };
      messageDiv.textContent = reasonMap[data.reason] || '激活失败,请重试';
      messageDiv.style.display = 'block';
    }
  } catch (error) {
    messageDiv.className = 'message message-error';
    messageDiv.textContent = '验证失败,请稍后重试';
    messageDiv.style.display = 'block';
  } finally {
    
    submitBtn.disabled = false;
    btnText.style.display = 'inline';
    btnLoading.style.display = 'none';
  }
});
</script>

    </main>
    <footer class="site-footer">
  <p>© 2026 Liu Zihao &middot; <a href="../index.xml">RSS</a></p>
</footer>

  </div>
</body>
</html>
